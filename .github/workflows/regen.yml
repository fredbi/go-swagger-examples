name: Regenerate examples

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  regen:
    name: regenerate examples
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          check-latest: true
          cache: true
      -
        name: Install swagger CLI
        run: go install github.com/go-swagger/go-swagger/cmd/swagger@latest
      -
        name: Regenerate examples
        run: hack/regen-samples.sh
      -
        name: Build check
        run: go build ./...
      -
        name: Create or update PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "chore: regenerate examples from latest go-swagger"
          branch: regen/scheduled
          delete-branch: true
          title: "chore: regenerate examples from latest go-swagger"
          body: |
            Scheduled regeneration using `swagger@latest`.
            Review the diff to confirm generated changes are expected.
          labels: "bot"
          signoff: true
